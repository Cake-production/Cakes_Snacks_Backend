# Spring Application
spring.application.name=cakes-and-snacks-backend

  # Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/cakes_snacks?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=kash07765G*
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000

  # JPA Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.jdbc.fetch_size=50
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true

  # Liquibase Configuration
spring.liquibase.change-log=classpath:db/migration/master.xml
spring.liquibase.enabled=true

  # Mail Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

  # Jackson Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false

  # Server Configuration
server.port=8080
server.servlet.context-path=/api
server.compression.enabled=true
server.compression.min-response-size=1024
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on_param
server.error.include-exception=false

  # Logging Configuration
logging.level.root=INFO
logging.level.com.cakesandsnacks=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/application.log
logging.file.max-size=10MB
logging.file.max-history=30

  # JWT Configuration
jwt.secret=${JWT_SECRET:your-secret-key-change-in-production-environment-at-least-32-characters-long}
jwt.expiration=86400000
jwt.refresh-token-expiration=604800000

  # Stripe Configuration (Optional)
stripe.api-key=${STRIPE_API_KEY:sk_test_your_key}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:whsec_your_secret}

  # CORS Configuration
cors.allowed-origins=http://localhost:3000,http://localhost:3001,https://yourdomain.com
cors.allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
cors.allowed-headers=*
cors.max-age=3600
cors.allow-credentials=true

  # Application Info
app.name=Cakes & Snacks
app.version=1.0.0
app.description=Premium Artisanal Bakery E-commerce Platform
app.timezone=UTC
app.frontend.url=${FRONTEND_URL}